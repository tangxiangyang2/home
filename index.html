<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tangxiangyang2.github.io/home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <base target="_blank">
    <style>
        .hero-bg {
            background-image: url('https://t.alcy.cc/pc');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<body class="bg-gray-100">
    

    <!-- 整个应用的根容器 -->
    <!-- max-w-6xl: 最大宽度约1152px，防止太宽；mx-auto: 左右自动边距，实现居中 -->
    <div id="app" class="max-w-6xl mx-auto">
    
        <!-- 顶部封面背景 -->
        <!-- relative: 相对定位，方便子元素绝对定位；h-48: 高度12rem(192px)；md:h-64: 中等屏幕高度16rem；lg:h-80: 大屏幕高度20rem -->
        <!-- flex: 弹性布局；items-center: 垂直居中；justify-center: 水平居中 -->
        <div class="hero-bg relative h-48 md:h-64 lg:h-80 flex items-center justify-center"></div>
    
        <!-- 页面大标题 -->
        <!-- text-lg: 大字体(1.125rem)；font-bold: 粗体；mb-6: 下边距1.5rem；text-center: 文字居中 -->
        <h1 class="text-lg font-bold mb-6 text-center">{{ title }}</h1>
    
        <!-- 遍历每个分类 -->
        <!-- mb-6: 下边距1.5rem，分类之间留空；p-4: 内边距1rem -->
        <div v-for="cat in categories" :key="cat.name" class="mb-6 p-4">
    
            <!-- 分类标题 -->
            <!-- text-lg: 大字体；font-semibold: 半粗体；text-gray-700: 深灰色文字；mb-3: 下边距0.75rem -->
            <!-- pl-2: 左内边距0.5rem；border-l-4: 左边框4px宽；border-blue-500: 蓝色边框 -->
            <h2 class="text-lg font-semibold text-gray-700 mb-3 pl-2 border-l-4 border-blue-500">{{ cat.name }}</h2>
    
            <!-- 链接卡片容器 -->
            <!-- grid: 网格布局；grid-cols-1: 手机1列；md:grid-cols-2: 中等屏幕2列；gap-3: 卡片间距0.75rem -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
    
                <a v-for="item in cat.items" :key="item.name" :href="item.url" target="_blank"
                    class="bg-white p-3 rounded shadow hover:shadow-md transition block flex items-center">
                
                    <!-- 左边：图片区域，占10% -->
                    <!-- w-[10%]: 宽度10%；shrink-0: 不压缩，保持固定比例 -->
                    <div class="w-[5%] shrink-0">
                        <img :src="item.ico || 'icon.png'" class="w-6 h-6 object-contain" alt="图标">
                    </div>
                
                    <!-- 中间：标题区域，占80% -->
                    <!-- w-[80%]: 宽度80%；px-2: 左右内边距0.5rem，和图片、标签隔开 -->
                    <!-- truncate: 文字太长显示省略号...；text-blue-600: 蓝色文字 -->
                    <div class="w-[85%] px-2 truncate text-blue-600 hover:text-red-600">
                        {{item.add || item.url}}
                    </div>
                
                    <!-- 右边：标签区域，占10% -->
                    <!-- w-[10%]: 宽度10%；shrink-0: 不压缩；text-right: 文字靠右对齐 -->
                    <div v-if="item.add" class="w-[10%] shrink-0 text-center text-sm border rounded bg-red-400 text-white">
                         HOT
                    </div>
                </a>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const title = ref('导航页');
                const categories = ref([]);

                // 使用 microlink API 获取网站标题
                const fetchTitle = async (url) => {
                    try {
                        const apiUrl = `https://api.microlink.io/?url=${encodeURIComponent(url)}`;
                        const res = await fetch(apiUrl);
                        const data = await res.json();
                        return data.data?.title || url;
                    } catch (e) {
                        return url;
                    }
                };

                // 获取网站图标（favicon）的地址
                // 用国内一为忆的 favicon 服务，上海云盾+Cloudflare CDN 加速
                const getFavicon = (url) => {
                    try {
                        // 从网址中提取域名，比如 https://www.baidu.com/abc → www.baidu.com
                        const domain = new URL(url).hostname;
                        // 返回接口地址，格式：域名.png
                        return `https://api.xinac.net/icon/?url=${domain}`;
                    } catch (e) {
                        return '';
                    }
                };
                
                // 获取yaml的内容
                onMounted(async () => {
                    try {
                        const res = await fetch('nav.yaml');
                        const data = jsyaml.load(await res.text());
                        title.value = data.title || '导航页';
                        categories.value = data.categories || [];
                    } catch (e) {
                        console.log(e)
                        // 默认数据
                        categories.value = [
                            {
                                name: '常用', items: [
                                    { name: '百度', url: 'https://www.baidu.com' },
                                    { name: 'GitHub', url: 'https://github.com' },
                                    { name: 'B站', url: 'https://www.bilibili.com' },
                                    { name: '知乎', url: 'https://www.zhihu.com' }
                                ]
                            },
                            {
                                name: '工具', items: [
                                    { name: '翻译', url: 'https://translate.google.com' },
                                    { name: '地图', url: 'https://map.baidu.com' },
                                    { name: '邮箱', url: 'https://mail.google.com' },
                                    { name: '网盘', url: 'https://pan.baidu.com' }
                                ]
                            }
                        ];
                    }

                    // 异步获取每个网站的标题
                    for (const cat of categories.value) {
                        for (const item of cat.items) {
  if(!item.add){
                            item.add = await fetchTitle(item.url);}
                            item.ico = await getFavicon(item.url);
                            console.log(item.ico)
                        }
                    }
                });

                return { title, categories };
            }
        }).mount('#app');
    </script>
</body>

</html>
