<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tangxiangyang2.github.io/home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <base target="_blank">
    <style>
        .hero-bg {
            background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<body class="bg-gray-100">
    

    <div id="app" class="max-w-6xl mx-auto p-4">
         
       <!-- 封面背景 -->
        <div class="hero-bg relative h-48 md:h-64 lg:h-80 flex items-center justify-center">
            <div class="absolute inset-0 bg-black/40"></div>
            <div class="relative z-10 text-center text-white px-4">
                <h1 class="text-xl md:text-xl lg:text-xl font-bold mb-2">{{ title }}</h1>
                <p class="text-sm md:text-base opacity-80">{{ subtitle }}</p>
            </div>
        </div>
        <h1 class="text-lg font-bold mb-6 text-center">{{ title }}</h1>

        <div v-for="cat in categories" :key="cat.name" class="mb-6">
            <h2 class="text-lg font-semibold text-gray-700 mb-3 pl-2 border-l-4 border-blue-500">{{ cat.name }}</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <a v-for="item in cat.items" :key="item.name" :href="item.url" target="_blank"
                    class="bg-white p-3 rounded shadow hover:shadow-md hover:text-blue-600 transition block">
                    <!-- 文章的标题 -->
                    <div class="truncate text-blue-600">{{item.add || item.fetchedTitle}}</div>
                </a>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const title = ref('导航页');
                const categories = ref([]);

                // 使用 microlink API 获取网站标题
                const fetchTitle = async (url) => {
                    try {
                        const apiUrl = `https://api.microlink.io/?url=${encodeURIComponent(url)}`;
                        const res = await fetch(apiUrl);
                        const data = await res.json();
                        return data.data?.title || url;
                    } catch (e) {
                        return url;
                    }
                };
                
                // 获取yaml的内容
                onMounted(async () => {
                    try {
                        const res = await fetch('nav.yaml');
                        const data = jsyaml.load(await res.text());
                        title.value = data.title || '导航页';
                        categories.value = data.categories || [];
                    } catch (e) {
                        console.log(e)
                        // 默认数据
                        categories.value = [
                            {
                                name: '常用', items: [
                                    { name: '百度', url: 'https://www.baidu.com' },
                                    { name: 'GitHub', url: 'https://github.com' },
                                    { name: 'B站', url: 'https://www.bilibili.com' },
                                    { name: '知乎', url: 'https://www.zhihu.com' }
                                ]
                            },
                            {
                                name: '工具', items: [
                                    { name: '翻译', url: 'https://translate.google.com' },
                                    { name: '地图', url: 'https://map.baidu.com' },
                                    { name: '邮箱', url: 'https://mail.google.com' },
                                    { name: '网盘', url: 'https://pan.baidu.com' }
                                ]
                            }
                        ];
                    }

                    // 异步获取每个网站的标题
                    for (const cat of categories.value) {
                        for (const item of cat.items) {
                            item.fetchedTitle = await fetchTitle(item.url);
                        }
                    }
                });

                return { title, categories };
            }
        }).mount('#app');
    </script>
</body>

</html>
